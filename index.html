<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC Telecom</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fa;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #4B0082;
    color: white;
}

/* Hero */
.hero {
    background: linear-gradient(to right, #4B0082, #8A2BE2);
    color: white;
    text-align: center;
    padding: 60px;
}

/* Plans */
.plans {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    width: 250px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

button {
    padding: 10px 20px;
    background: purple;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

/* Payment Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    padding: 30px;
    margin: 10% auto;
    width: 300px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>STC Telecom</h2>
</div>

<!-- Hero -->
<div class="hero">
    <h1>Best Telecom Plans</h1>
    <p>Choose your plan and pay instantly</p>
</div>

<!-- Plans -->
<div class="plans">

    <div class="card">
        <h2>Basic</h2>
        <p>1GB/day</p>
        <h3>SAR 50</h3>
        <button onclick="buy('Basic',50)">Buy Now</button>
    </div>

    <div class="card">
        <h2>Standard</h2>
        <p>2GB/day</p>
        <h3>SAR 100</h3>
        <button onclick="buy('Standard',100)">Buy Now</button>
    </div>

    <div class="card">
        <h2>Premium</h2>
        <p>Unlimited Data</p>
        <h3>SAR 200</h3>
        <button onclick="buy('Premium',200)">Buy Now</button>
    </div>

</div>

<!-- Payment Popup -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h2>Payment</h2>
        <p id="plan"></p>
        <p id="price"></p>

        <input type="text" placeholder="Card Number"><br><br>
        <input type="text" placeholder="Expiry"><br><br>
        <input type="text" placeholder="CVV"><br><br>

        <button onclick="pay()">Pay Now</button><br><br>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
function buy(plan, price) {
    document.getElementById("plan").innerText = "Plan: " + plan;
    document.getElementById("price").innerText = "Price: SAR " + price;

    document.getElementById("paymentModal").style.display = "block";
}

function closeModal() {
    document.getElementById("paymentModal").style.display = "none";
}

function pay() {
    alert("Payment Successful ✅");
    closeModal();
}
</script>

</body>
</html>
