<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC NextGen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.logo {
    font-size:22px;
    font-weight:bold;
    color:#a78bfa;
}

.nav-right {
    display:flex;
    gap:25px;
    align-items:center;
}

.profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img {
    width:35px;
    border-radius:50%;
}

/* HERO */
.hero {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:80px;
}

/* PRODUCTS */
.products {
    display:flex;
    padding:40px;
}

.sidebar {
    width:200px;
}

.sidebar div {
    padding:15px;
    margin:10px 0;
    background:#1e293b;
    border-radius:10px;
    cursor:pointer;
}

.sidebar div:hover {
    background:#7c3aed;
}

.plans {
    flex:1;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

/* CARDS */
.card {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    width:250px;
    text-align:center;
}

button {
    padding:10px 15px;
    background:#7c3aed;
    border:none;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

/* PAYMENT PANEL */
.payment {
    display:none;
    position:fixed;
    right:0;
    top:0;
    width:350px;
    height:100%;
    background:#111827;
    padding:20px;
    animation:slideIn 0.3s;
}

@keyframes slideIn {
    from { right:-350px; }
    to { right:0; }
}

input, select {
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:5px;
    border:none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">STC NextGen</div>

    <div class="nav-right">
        <span>Services</span>
        <span>Offers</span>

        <div class="profile">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <span>User</span>
        </div>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>Future of Telecom Starts Here</h1>
        <p>Ultra-fast connectivity with next-gen digital services</p>
        <button onclick="scrollToProducts()">Get Started</button>
    </div>
    <div><h2>🚀 5G Ready</h2></div>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

    <div class="sidebar">
        <div onclick="loadPlans('mobile')">📱 Mobile</div>
        <div onclick="loadPlans('fiber')">🌐 Fiber</div>
        <div onclick="loadPlans('business')">🏢 Business</div>
    </div>

    <div class="plans" id="plans">
        <p>Select a category</p>
    </div>

</div>

<!-- PAYMENT PANEL -->
<div class="payment" id="payment">

    <div style="text-align:right;">
        <span onclick="closePayment()" style="cursor:pointer;font-size:20px;">❌</span>
    </div>

    <h2>Checkout</h2>

    <p id="plan"></p>
    <p id="price"></p>

    <!-- PROMO DROPDOWN -->
    <h3>Apply Promo</h3>

    <select id="promoDropdown" onchange="selectPromo()">
        <option value="">-- Select Promo Code --</option>
        <option value="NEXT20">NEXT20 - 20% OFF</option>
        <option value="SAVE50">SAVE50 - Flat 50 SAR OFF</option>
        <option value="WELCOME10">WELCOME10 - 10% OFF</option>
    </select>

    <input id="promo" placeholder="Or Enter Promo Code">
    <button onclick="applyPromo()">Apply</button>
    <p id="msg"></p>

    <input placeholder="Card Number">
    <input placeholder="Expiry">
    <input placeholder="CVV">

    <button onclick="pay()">Pay Now</button><br><br>
    <button onclick="closePayment()">Cancel</button>
</div>

<script>

let price = 0;

function scrollToProducts(){
    document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function loadPlans(type){
    let html = "";

    if(type==="mobile"){
        html=`
        <div class="card">
            <h3>Starter</h3>
            <p>SAR 40</p>
            <button onclick="buy('Starter',40)">Choose</button>
        </div>
        <div class="card">
            <h3>Unlimited Pro</h3>
            <p>SAR 130</p>
            <button onclick="buy('Unlimited Pro',130)">Choose</button>
        </div>`;
    }
    else if(type==="fiber"){
        html=`
        <div class="card">
            <h3>Fiber Lite</h3>
            <p>SAR 180</p>
            <button onclick="buy('Fiber Lite',180)">Choose</button>
        </div>`;
    }
    else {
        html=`
        <div class="card">
            <h3>Enterprise Pack</h3>
            <p>SAR 500</p>
            <button onclick="buy('Enterprise',500)">Choose</button>
        </div>`;
    }

    document.getElementById("plans").innerHTML = html;
}

function buy(p, pr){
    price = pr;
    document.getElementById("plan").innerText = "Plan: " + p;
    document.getElementById("price").innerText = "Price: SAR " + pr;

    document.getElementById("payment").style.display="block";
}

function closePayment(){
    document.getElementById("payment").style.display="none";
}

function selectPromo(){
    let selected = document.getElementById("promoDropdown").value;
    document.getElementById("promo").value = selected;
}

function applyPromo(){
    let code = document.getElementById("promo").value;

    if(code==="NEXT20"){
        price = price * 0.8;
        document.getElementById("msg").innerText="20% Discount Applied!";
    }
    else if(code==="SAVE50"){
        price = price - 50;
        document.getElementById("msg").innerText="Flat 50 SAR Discount Applied!";
    }
    else if(code==="WELCOME10"){
        price = price * 0.9;
        document.getElementById("msg").innerText="10% Discount Applied!";
    }
    else {
        document.getElementById("msg").innerText="Invalid Code";
    }

    document.getElementById("price").innerText = "Price: SAR " + price;
}

function pay(){
    alert("Payment Successful 🚀");
    closePayment();
}

</script>

</body>
</html>
